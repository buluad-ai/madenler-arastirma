version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: madenler-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: madenler
      MONGO_INITDB_ROOT_PASSWORD: madenler2026
      MONGO_INITDB_DATABASE: madenler
    volumes:
      - mongo_data:/data/db
    networks:
      - madenler-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: madenler-es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - "cluster.routing.allocation.disk.threshold_enabled=false"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - madenler-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cat/health | grep -q green"]
      interval: 30s
      timeout: 10s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: madenler-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - madenler-net

  app:
    build: .
    container_name: madenler-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://madenler:madenler2026@mongodb:27017/madenler?authSource=admin
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      - mongodb
      - elasticsearch
    volumes:
      - ./data:/app/data
    networks:
      - madenler-net

volumes:
  mongo_data:
  es_data:

networks:
  madenler-net:
    driver: bridge
